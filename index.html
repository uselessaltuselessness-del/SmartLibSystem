<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NU Cebu Library System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #004494; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-page" class="card">
        <h2>Library Login</h2>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="login()">Log In</button>
        <p id="error-msg" style="color: red; font-size: 14px;"></p>
    </div>

    <div id="dashboard-page" class="card hidden">
        <h2 id="welcome-msg">Welcome!</h2>
        <p>Your Role: <strong id="user-role"></strong></p>
        <button onclick="logout()" style="background-color: #dc3545;">Log Out</button>
    </div>

    <script>
        // Paste your keys below. Keep the single quotation marks!
        const supabaseUrl = 'https://zrrqbzcsefmnfvqdwocw.supabase.co/rest/v1/';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpycnFiemNzZWZtbmZ2cWR3b2N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTg0MjMsImV4cCI6MjA5NTUzNDQyM30.TAoFWIaPWY0Myn40YqYT-Sadr6hRKgzDyzfvDc9xjxQ';
        
        const supabase = supabaseClient.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.innerText = "Checking credentials...";

            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('email', email)
                .eq('password', password)
                .maybeSingle();

            if (data) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard-page').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = `Welcome, ${data.name}!`;
                document.getElementById('user-role').innerText = data.role.toUpperCase();
                errorMsg.innerText = "";
            } else {
                errorMsg.innerText = "Invalid email or password.";
            }
        }

        function logout() {
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('login-page').classList.remove('hidden');
            document.getElementById('dashboard-page').classList.add('hidden');
        }
    </script>
</body>
</html>
