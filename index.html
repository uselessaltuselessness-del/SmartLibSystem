<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GitHub Data Store Demo</title>
  <style>
    body { font-family: system-ui, Arial; padding: 24px; max-width: 800px; margin: auto; }
    button { margin-right: 8px; padding: 8px 12px; }
    pre { background:#f6f8fa; padding:12px; border-radius:6px; overflow:auto; }
  </style>
</head>
<body>
  <h1>GitHub Data Store Demo</h1>
  <p>Click <strong>Save Data</strong> to write the sample DATA array to <code>data.json</code> in your repo via a Netlify Function. Click <strong>Load Data</strong> to read it back.</p>

  <button id="saveBtn">Save Data</button>
  <button id="loadBtn">Load Data</button>
  <pre id="output">Output will appear here</pre>

  <script src="script.js"></script>
</body>
</html>
